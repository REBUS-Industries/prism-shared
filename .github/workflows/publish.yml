name: publish-shared

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rebus-industries'
      - run: npm ci
      - run: npm run build
      - name: Publish (tag) or publish beta (main)
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            npm publish
          else
            npm version prerelease --preid=sha.$(git rev-parse --short HEAD) --no-git-tag-version
            npm publish --tag beta
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
